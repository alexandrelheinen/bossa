name: Formatting

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: formatting-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  formatting:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Validate C++ formatting
        run: |
          find src include -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Show formatting differences (if any)
        if: failure()
        run: |
          echo "The following files have formatting issues:"
          find src include -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror || true
          echo ""
          echo "Run './scripts/clang.sh' locally to fix formatting issues."
