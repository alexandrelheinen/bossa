name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-build:
    name: Native Build (x86_64)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libyaml-cpp-dev \
            libsystemd-dev \
            libgpiod-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev \
            pkg-config

      - name: Build (native x86_64)
        run: |
          ./scripts/build.sh

      - name: Verify executable
        run: |
          if [ ! -f build/final/bin/bossa-daemon ]; then
            echo "Error: bossa-daemon executable not found"
            exit 1
          fi
          file build/final/bin/bossa-daemon
          ldd build/final/bin/bossa-daemon || true

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -V

  cross-compile-arm64:
    name: Cross-Compile (ARM64)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # arm64 packages come from ports.ubuntu.com, not archive.ubuntu.com
          printf '%s\n' \
            'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse' \
            'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse' \
            'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse' \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libyaml-cpp-dev \
            pkg-config
          # Multiarch -dev packages may clash on shared helper binaries
          # (e.g. curl-config); force overwrite is safe for CI linkers.
          sudo apt-get install -y \
            -o Dpkg::Options::="--force-overwrite" \
            libsqlite3-dev:arm64 \
            libcurl4-openssl-dev:arm64

      - name: Cross-compile for ARM64
        run: |
          ./scripts/build.sh -t toolchain-arm64.cmake

      - name: Verify ARM64 executable
        run: |
          if [ ! -f build/final/bin/bossa-daemon ]; then
            echo "Error: bossa-daemon ARM64 executable not found"
            exit 1
          fi
          file build/final/bin/bossa-daemon
          echo "Expected: ELF 64-bit LSB executable, ARM aarch64"

      - name: Verify tarball creation
        run: |
          if [ ! -f build/bossa.tar.gz ]; then
            echo "Error: bossa.tar.gz not found"
            exit 1
          fi
          tar -tzf build/bossa.tar.gz | head -n 20

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bossa-arm64
          path: build/bossa.tar.gz
          retention-days: 7
